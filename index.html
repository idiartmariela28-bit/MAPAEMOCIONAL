    function ActionButton({ onClick, children, variant = "primary" }) {
      const styles = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700",
        secondary: "bg-slate-900 text-white hover:bg-black"
      };
      return (
        <button
          onClick={onClick}
          className={`w-full p-5 rounded-[1.8rem] font-black text-lg transition-all shadow-lg ${styles[variant]}`}
        >
          {children}
        </button>
      );
    }

    function InfoCard({ title, content, dark }) {
      return (
        <div className={`p-7 rounded-[2rem] border shadow-sm ${dark ? "bg-indigo-600 border-indigo-600 text-white" : "bg-white border-slate-100 text-slate-700"}`}>
          <div className={`font-black uppercase text-xs tracking-widest mb-3 ${dark ? "text-indigo-100" : "text-indigo-600"}`}>
            {title}
          </div>
          <p className="leading-relaxed font-medium">{content}</p>
        </div>
      );
    }

    function ProtocolStep({ num, title, desc }) {
      return (
        <li className="flex gap-4">
          <div className="w-10 h-10 rounded-2xl bg-indigo-600 text-white flex items-center justify-center font-black shrink-0">
            {num}
          </div>

            <div className="text-slate-300 text-sm leading-relaxed">{desc}</div>
          </div>
        </li>
      );
    }

    function RadarSimple({ counts }) {
      const data = [
        { label: "Rechazo", value: counts?.rechazo || 0, color: "#6366f1" },
        { label: "Abandono", value: counts?.abandono || 0, color: "#ec4899" },
        { label: "Humillación", value: counts?.humillacion || 0, color: "#f59e0b" },
        { label: "Traición", value: counts?.traicion || 0, color: "#ef4444" },
        { label: "Injusticia", value: counts?.injusticia || 0, color: "#10b981" }
      ];

      const size = 320;
      const cx = 160;
      const cy = 160;
      const maxR = 95;
      const levels = 5;
      const maxValue = 10;

      function pointFor(i, value) {
        const angle = (-Math.PI / 2) + (i * 2 * Math.PI / data.length);
        const r = (value / maxValue) * maxR;
        return {
          x: cx + Math.cos(angle) * r,
          y: cy + Math.sin(angle) * r
        };
      }

      const polygonPoints = data.map((d, i) => {
        const p = pointFor(i, d.value);
        return `${p.x},${p.y}`;
      }).join(" ");

      return (
        <div className="bg-slate-50 rounded-[3rem] p-6 border-2 border-slate-100 shadow-sm">
          <div className="text-left mb-4">
            <div className="text-sm font-black uppercase tracking-widest text-slate-400">
              Tu huella emocional
            </div>
            <div className="text-xl font-black text-slate-900">
              Gráfico radar de heridas
            </div>
          </div>

          <div className="flex justify-center">
            <svg viewBox="0 0 320 320" className="w-full max-w-[320px] h-auto">
              {[1, 2, 3, 4, 5].map((level) => {
                const r = (level / levels) * maxR;
                const points = data.map((_, i) => {
                  const angle = (-Math.PI / 2) + (i * 2 * Math.PI / data.length);
                  const x = cx + Math.cos(angle) * r;
                  const y = cy + Math.sin(angle) * r;
                  return `${x},${y}`;
                }).join(" ");
                return (
                  <polygon
                    key={level}
                    points={points}
                    fill="none"
                    stroke="#cbd5e1"
                    strokeWidth="1"
                  />
                );
              })}

              {data.map((_, i) => {
                const p = pointFor(i, maxValue);
                return (
                  <line
                    key={i}
                    x1={cx}
                    y1={cy}
                    x2={p.x}
                    y2={p.y}
                    stroke="#cbd5e1"
                    strokeWidth="1"
                  />
                );
              })}

              <polygon
                points={polygonPoints}
                fill="#6366f1"
                fillOpacity="0.28"
                stroke="#6366f1"
                strokeWidth="3"
              />

              {data.map((d, i) => {
                const p = pointFor(i, d.value);
                return (
                  <circle
                    key={d.label}
                    cx={p.x}
                    cy={p.y}
                    r="5"
                    fill="#6366f1"
                  />
                );
              })}

              {data.map((d, i) => {
                const angle = (-Math.PI / 2) + (i * 2 * Math.PI / data.length);
                const labelR = maxR + 28;
                const x = cx + Math.cos(angle) * labelR;
                const y = cy + Math.sin(angle) * labelR;

                return (
                  <text
                    key={d.label}
                    x={x}
                    y={y}
                    textAnchor="middle"
                    dominantBaseline="middle"
                    fontSize="12"
                    fontWeight="700"
                    fill="#475569"
                  >
                    {d.label}
                  </text>
                );
              })}
            </svg>
          </div>

          <div className="grid grid-cols-1 gap-3 mt-5">
            {data.map((d) => (
              <div key={d.label}>
                <div className="flex justify-between text-sm font-bold text-slate-600 mb-1">
                  <span>{d.label}</span>
                  <span>{d.value}/10</span>
                </div>
                <div className="w-full h-3 bg-white rounded-full overflow-hidden border border-slate-200">
                  <div
                    className="h-full rounded-full"
                    style={{
                      width: `${(d.value / 10) * 100}%`,
                      backgroundColor: d.color
                    }}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("home");
      const [scope, setScope] = useState(null);
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [results, setResults] = useState(null);
      const [testScore, setTestScore] = useState(0);
      const [testStep, setTestStep] = useState(0);

      useEffect(() => {
        const saved = localStorage.getItem("mapa_emocional_resultado");
        if (saved) {
          try { setResults(JSON.parse(saved)); } catch (e) {}
        }
      }, []);

      function startQuiz(selectedScope) {
        setScope(selectedScope);
        setStep(0);
        setAnswers([]);
        setView("quiz");
      }

      function resetSession() {
        setScope(null);
        setStep(0);
        setAnswers([]);
        setTestScore(0);
        setTestStep(0);
        setView("home");
      }

      function processAnswer(wound) {
        const newAnswers = [...answers, wound];
        const totalQuestions = SCENARIOS[scope].length;

        if (step < totalQuestions - 1) {
          setAnswers(newAnswers);
          setStep(step + 1);
        } else {
          const counts = { rechazo: 0, abandono: 0, humillacion: 0, traicion: 0, injusticia: 0 };
          newAnswers.forEach(ans => counts[ans]++);
          const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
          const main = sorted[0][0];
          const finalRes = { main, counts, scope };
          setResults(finalRes);
          localStorage.setItem("mapa_emocional_resultado", JSON.stringify(finalRes));
          setView("results");
        }
      }

      function handleTest(idx) {
        if (idx === TEST_QUESTIONS[testStep].correct) {
          setTestScore(prev => prev + 1);
        }
        if (testStep < TEST_QUESTIONS.length - 1) {
          setTestStep(prev => prev + 1);
        } else {
          setView("testResults");
        }
      }

      const config = results ? WOUNDS_CONFIG[results.main] : null;

      function renderHome() {
        return (
          <div className="space-y-10 fade-in">
            <div className="space-y-4">
              <h1 className="text-5xl font-black text-slate-900 leading-none tracking-tight">
                Tu Mapa <span className="text-indigo-600">Emocional</span>
              </h1>
              <p className="text-slate-500 text-xl font-medium leading-relaxed">
                Detectá tu herida emocional dominante en escenarios reales de vida.
              </p>
            </div>

            <div className="grid gap-4">
              {[
                { id: "personal", label: "Personal", emoji: "👤", color: "bg-indigo-50 border-indigo-100 text-indigo-700" },
                { id: "pareja", label: "Pareja", emoji: "💗", color: "bg-pink-50 border-pink-100 text-pink-700" },
                { id: "laboral", label: "Laboral", emoji: "💼", color: "bg-emerald-50 border-emerald-100 text-emerald-700" }
              ].map(item => (
                <button
                  key={item.id}
                  onClick={() => startQuiz(item.id)}
                  className={`p-8 border-2 rounded-[2.2rem] flex items-center justify-between shadow-sm ${item.color}`}
                >
                  <div className="flex items-center gap-5">
                    <div className="p-4 bg-white rounded-2xl shadow-sm text-2xl">{item.emoji}</div>
                    <div className="font-black text-2xl">{item.label}</div>
                  </div>
                  <div className="text-xl">→</div>
                </button>
              ))}
            </div>

            {results && (
              <div className="p-6 bg-slate-50 rounded-3xl border border-slate-200 flex items-center justify-between gap-4">
                <div>
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest">Último análisis</div>
                  <div className="font-bold text-slate-700 uppercase italic">Herida de {results.main}</div>
                </div>
                <button onClick={() => setView("results")} className="text-indigo-600 font-bold text-sm underline">
                  Ver de nuevo
                </button>
              </div>
            )}
          </div>
        );
      }

      function renderQuiz() {
        const scenario = SCENARIOS[scope][step];
        const totalQuestions = SCENARIOS[scope].length;

        return (
          <div className="space-y-10 fade-in">
            <div className="space-y-3">
              <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                <span>{scope}</span>
                <span>{step + 1} / {totalQuestions}</span>
              </div>
              <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-slate-900 transition-all duration-700" style={{ width: `${((step + 1) / totalQuestions) * 100}%` }}></div>
              </div>
            </div>

            <h2 className="text-3xl font-bold text-slate-800 leading-tight">{scenario.q}</h2>

            <div className="space-y-3">
              {scenario.options.map((opt, i) => (
                <button
                  key={i}
                  onClick={() => processAnswer(opt.w)}
                  className="w-full text-left p-6 rounded-3xl border-2 border-slate-50 bg-slate-50/30 hover:border-slate-900 hover:bg-white transition-all text-base font-bold text-slate-700 flex gap-5 items-center shadow-sm"
                >
                  <span className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xs font-black text-slate-300 shadow-inner">
                    {String.fromCharCode(65 + i)}
                  </span>
                  {opt.t}
                </button>
              ))}
            </div>
          </div>
        );
      }

      function renderResults() {
        return (
          <div className="space-y-10 fade-in text-center">
            <div className="space-y-3">
              <h2 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter text-slate-900 leading-none">
                HERIDA DE {config.name}
              </h2>
              <div className="flex flex-wrap justify-center gap-2 mt-4">
                <span className="px-4 py-1.5 bg-slate-100 text-slate-900 rounded-full text-xs font-black uppercase tracking-widest border border-slate-200">
                  Máscara: {config.mask}
                </span>
                <span className="px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest border bg-indigo-50 text-indigo-700 border-indigo-200">
                  Respuesta: {config.survivalResponse}
                </span>
              </div>
            </div>

            <RadarSimple counts={results.counts} />

            <div className="bg-slate-50 rounded-[3rem] p-8 border-2 border-slate-100 text-left">
              <div className="font-black text-slate-900 text-lg mb-4">Intensidad detectada</div>
              <div className="space-y-4">
                {Object.entries(results.counts).map(([key, value]) => (
                  <div key={key}>
                    <div className="flex justify-between text-sm font-bold text-slate-600 mb-1">
                      <span>{WOUNDS_CONFIG[key].name}</span>
                      <span>{value}</span>
                    </div>
                    <div className="w-full h-3 bg-white rounded-full overflow-hidden border border-slate-200">
                      <div
                        className="h-full rounded-full"
                        style={{
                          width: `${(value / SCENARIOS[scope].length) * 100}%`,
                          backgroundColor: WOUNDS_CONFIG[key].color
                        }}
                      ></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="grid gap-4 pb-8">
              <ActionButton onClick={() => setView("longExplanation")} variant="secondary">
                📘 Análisis profundo
              </ActionButton>
              <ActionButton onClick={() => setView("awareness")}>
                ⚡ Método de las 2A
              </ActionButton>
            </div>
          </div>
        );
      }

      function renderLongExplanation() {
        return (
          <div className="space-y-10 fade-in pb-16">
            <button onClick={() => setView("results")} className="text-slate-400 hover:text-slate-900 flex items-center gap-2 text-xs font-black uppercase tracking-widest">
              ← Volver
            </button>

            <h2 className="text-5xl font-black text-slate-900 uppercase italic leading-none">
              Anatomía del {config.name}
            </h2>

            <div className="h-2 w-32 bg-indigo-600 rounded-full shadow-lg"></div>

            <div className="p-8 md:p-10 bg-slate-50 rounded-[3rem] border-2 border-slate-100 space-y-8 shadow-sm">
              <div className="text-slate-700 text-xl leading-relaxed italic font-bold">
                “{config.longDesc}”
              </div>

              <InfoCard title="Génesis de la herida" content={config.genesis} />
              <InfoCard title="Toma de consciencia" content={config.awareness} dark />

              <div className="p-6 bg-white rounded-3xl border border-slate-200 shadow-sm border-l-8 border-l-indigo-500">
                <h4 className="text-sm font-black text-indigo-600 uppercase mb-2">
                  Respuesta biológica: {config.survivalResponse}
                </h4>
                <p className="text-slate-600 font-medium italic">{config.survivalDesc}</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 text-center">
                <div className="p-8 bg-white rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
                  <div className="text-red-500 font-black uppercase text-xs tracking-widest">Temor</div>
                  <div className="text-2xl font-black text-slate-800 leading-tight">{config.fear}</div>
                </div>
                <div className="p-8 bg-white rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
                  <div className="text-emerald-500 font-black uppercase text-xs tracking-widest">Sanación</div>
                  <div className="text-2xl font-black text-slate-800 leading-tight">{config.healingKey}</div>
                </div>
              </div>
            </div>

            <ActionButton onClick={() => setView("awareness")}>Ir al método 2A</ActionButton>
          </div>
        );
      }

      function renderAwareness() {
        return (
          <div className="space-y-12 fade-in pb-16">
            <div className="space-y-4 text-center">
              <h2 className="text-5xl font-black text-slate-900 leading-tight uppercase italic">Método 2A</h2>
              <p className="text-slate-500 text-xl font-medium italic">Etiquetado cognitivo y acción alternativa</p>
            </div>

            <section className="p-8 md:p-10 border-2 border-slate-100 rounded-[3rem] bg-indigo-50/30 space-y-6 border-l-8 border-l-indigo-600">
              <div className="text-indigo-600 font-black text-sm uppercase tracking-widest">A de Autoconciencia</div>
              <h4 className="font-black text-3xl text-slate-900 leading-none">Detectar y etiquetar</h4>
              <p className="text-slate-600 text-lg font-medium leading-relaxed">
                Cuando sientas la activación biológica, frená y nombrala:
              </p>
              <div className="font-black text-indigo-600 text-2xl italic bg-white p-6 rounded-3xl shadow-inner border border-indigo-100 text-center">
                Mi {config.name} está hablando
              </div>
            </section>

            <section className="p-8 md:p-10 bg-slate-900 text-white rounded-[3rem] space-y-8 shadow-2xl">
              <div className="space-y-3">
                <h4 className="font-black text-indigo-400 tracking-[0.2em] uppercase text-sm">A de Acción Alternativa</h4>
                <p className="text-indigo-100 text-lg font-medium leading-relaxed">Reprogramación en 8 pasos:</p>
              </div>

              <ul className="space-y-6 text-left">
                <ProtocolStep num="1" title="Pausa de los 90s" desc="Esperá a que el disparo químico se disipe." />
                <ProtocolStep num="2" title="Respiración coherente" desc="Mandale seguridad al cuerpo." />
                <ProtocolStep num="3" title="Etiquetado cognitivo" desc="Activá tu parte racional." />
                <ProtocolStep num="4" title="Validación interna" desc="Tu miedo tiene historia. No sos ridícula por sentirlo." />
                <ProtocolStep num="5" title="Desafío al pensamiento" desc="Preguntate si es un hecho o una proyección." />
                <ProtocolStep num="6" title="Acto opuesto" desc={config.oppositeAction} />
                <ProtocolStep num="7" title="Sostén de la sensación" desc="Tolera la incomodidad de hacer algo nuevo." />
                <ProtocolStep num="8" title="Anclaje de victoria" desc="Celebrá tu consciencia, no la perfección." />
              </ul>
            </section>

            <ActionButton onClick={() => setView("test")} variant="secondary">
              Test de integración →
            </ActionButton>
          </div>
        );
      }

      function renderTest() {
        const tq = TEST_QUESTIONS[testStep];
        return (
          <div className="space-y-12 fade-in pb-16">
            <div className="space-y-4 text-center">
              <h2 className="text-4xl font-black text-slate-900 uppercase italic">Test de integración</h2>
              <p className="text-slate-500 font-medium text-lg italic">
                ¿Sabés desarmar tu mecanismo de {config.survivalResponse}?
              </p>
            </div>

            <div className="p-8 md:p-10 border-4 border-slate-50 rounded-[3rem] bg-slate-50/20 space-y-10 shadow-inner">
              <h3 className="text-3xl font-black text-slate-800 leading-none">{tq.q}</h3>
              <div className="grid gap-4">
                {tq.options.map((opt, i) => (
                  <button
                    key={i}
                    onClick={() => handleTest(i)}
                    className="p-6 bg-white border-2 border-slate-100 rounded-3xl text-left text-lg font-bold text-slate-600 hover:border-indigo-600 hover:text-indigo-600 transition-all shadow-sm"
                  >
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function renderTestResults() {
        return (
          <div className="space-y-10 fade-in text-center pb-20">
            <div className="w-36 h-36 bg-indigo-600 rounded-full mx-auto flex items-center justify-center text-white shadow-2xl text-6xl">
              🏆
            </div>
            <h2 className="text-5xl font-black text-slate-900 uppercase italic leading-none">
              ¡Maestría integrada!
            </h2>
            <p className="text-2xl text-slate-500 font-bold">
              Dominaste {testScore} de {TEST_QUESTIONS.length} conceptos.
            </p>
            <div className="p-8 bg-slate-900 text-white rounded-[3rem] shadow-2xl">
              <p className="text-2xl text-indigo-50 leading-relaxed font-medium italic">
                “La emoción es la brújula que apunta hacia tu herida, pero el registro es el mapa que te guía hacia tu libertad.”
              </p>
            </div>
            <div className="p-8 bg-emerald-50 rounded-3xl border border-emerald-100 text-emerald-800 font-bold text-lg italic shadow-sm">
              No registramos para controlar, sino para no ser controlados por lo desconocido.
            </div>
            <ActionButton onClick={resetSession} variant="secondary">
              Cerrar sesión terapéutica
            </ActionButton>
          </div>
        );
      }

      return (
        <div className="w-full max-w-3xl mx-auto min-h-screen bg-white flex flex-col font-sans shadow-2xl overflow-x-hidden">
          <main className="flex-1 p-6 md:p-8">
            {view === "home" && renderHome()}
            {view === "quiz" && renderQuiz()}
            {view === "results" && results && renderResults()}
            {view === "longExplanation" && results && renderLongExplanation()}
            {view === "awareness" && results && renderAwareness()}
            {view === "test" && results && renderTest()}
            {view === "testResults" && results && renderTestResults()}
          </main>
          <footer className="p-8 text-center border-t border-slate-50 bg-slate-50/30">
            <p className="text-[10px] text-slate-300 font-black uppercase tracking-[0.4em]">
              Mapa Emocional • Bio-Consciencia • 2026
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
