<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Emocional</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      return (
        <div className="min-h-screen flex items-center justify-center p-8">
          <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8 border">
            <h1 className="text-4xl font-bold mb-4">Mapa Emocional</h1>
            <p className="text-lg text-gray-700 mb-6">
              Tu app ya está online. Ahora hay que volver a pegar el contenido correcto.
            </p>
            <button
              className="bg-black text-white px-6 py-3 rounded-xl"
              onClick={() => alert("Funciona perfecto")}
            >
              Probar app
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
